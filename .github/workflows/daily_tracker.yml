name: Public Memory Engine

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4

      - name: Initialize Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scraper/requirements.txt

      - name: Deploy Dependencies
        run: |
          pip install -r scraper/requirements.txt
          python -m playwright install chromium --with-deps

      - name: Run Pipeline Automation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cd scraper
          python pipeline.py

      - name: Commit Mutation to Immutable Ledger
        run: |
          git config --global user.name "Public Memory Bot"
          git config --global user.email "bot@publicmemory.org"
          git add scraper/data/ledger.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "System Sync: $(date +'%Y-%m-%d %H:%M') [skip ci]" && git push)
